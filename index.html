<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Sets | Quizlet</title>

<link rel="icon" href="https://quizlet.com/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: #111116;
            border: 1px solid rgba(255, 120, 240, 0.15);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255, 120, 240, 0.1);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 120, 240, 0.15);
        }

        .title {
            color: #e0e0ff;
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: -0.01em;
        }

        .status {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff78f0;
            box-shadow: 0 0 10px #ff78f0;
            animation: pulse 2s infinite;
        }

        .key-indicator {
            color: #ff78f0;
            font-size: 0.7rem;
            opacity: 0.5;
            font-family: monospace;
        }

        .split-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .panel {
            background: #0c0c12;
            border-radius: 20px;
            border: 1px solid rgba(255, 120, 240, 0.15);
            padding: 1.5rem;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            color: #c0c0f0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: #ff78f0;
            border-radius: 50%;
        }

        .input-area {
            width: 100%;
            background: #050507;
            border: 1px solid rgba(255, 120, 240, 0.2);
            border-radius: 14px;
            padding: 1rem;
            color: #e0e0ff;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 1rem;
            outline: none;
            transition: all 0.15s;
        }

        .input-area:focus {
            border-color: #ff78f0;
            box-shadow: 0 0 0 2px rgba(255, 120, 240, 0.15);
        }

        .file-zone {
            border: 1px dashed rgba(255, 120, 240, 0.3);
            border-radius: 14px;
            padding: 1.5rem;
            text-align: center;
            background: #050507;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 1rem;
        }

        .file-zone:hover {
            border-color: #ff78f0;
            background: rgba(255, 120, 240, 0.02);
        }

        .file-zone svg {
            width: 24px;
            height: 24px;
            stroke: #ff78f0;
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }

        .file-zone p {
            color: #a0a0c0;
            font-size: 0.85rem;
        }

        .file-list {
            margin-top: 1rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem;
            background: #0a0a10;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(255, 120, 240, 0.1);
            color: #b0b0e0;
            font-size: 0.8rem;
        }

        .remove-file {
            color: #ff78f0;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.15s;
            font-size: 1rem;
            line-height: 1;
        }

        .remove-file:hover {
            opacity: 1;
        }

        .model-select {
            width: 100%;
            background: #050507;
            border: 1px solid rgba(255, 120, 240, 0.2);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #e0e0ff;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            cursor: pointer;
            outline: none;
        }

        .model-select option {
            background: #111116;
        }

        .key-file-section {
            background: #050507;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 120, 240, 0.1);
        }

        .key-file-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ff78f0;
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }

        .key-file-input {
            width: 100%;
            background: #0a0a10;
            border: 1px solid rgba(255, 120, 240, 0.2);
            border-radius: 8px;
            padding: 0.6rem;
            color: #e0e0ff;
            font-size: 0.8rem;
            font-family: monospace;
        }

        .key-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
            color: #606090;
            font-size: 0.7rem;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }

        .button {
            flex: 1;
            background: #0c0c12;
            border: 1px solid rgba(255, 120, 240, 0.3);
            border-radius: 40px;
            padding: 0.85rem;
            color: #ff78f0;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .button:hover {
            background: rgba(255, 120, 240, 0.1);
            border-color: #ff78f0;
        }

        .button.primary {
            background: #ff78f0;
            color: #0a0a0f;
            border: none;
            font-weight: 600;
        }

        .button.primary:hover {
            background: #ff8cf2;
            box-shadow: 0 0 20px rgba(255, 120, 240, 0.3);
        }

        .output-area {
            background: #0c0c12;
            border-radius: 20px;
            border: 1px solid rgba(255, 120, 240, 0.15);
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #c0c0f0;
            font-size: 0.85rem;
        }

        .output-content {
            background: #050507;
            border-radius: 14px;
            padding: 1.25rem;
            color: #e0e0ff;
            font-size: 0.9rem;
            min-height: 150px;
            white-space: pre-wrap;
            font-family: 'Monaco', 'Menlo', monospace;
            border: 1px solid rgba(255, 120, 240, 0.1);
            max-height: 300px;
            overflow-y: auto;
        }

        .loading {
            display: none;
            align-items: center;
            gap: 0.75rem;
            color: #ff78f0;
            font-size: 0.9rem;
            padding: 1rem;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 120, 240, 0.3);
            border-top-color: #ff78f0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .token-counter {
            color: #ff78f0;
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .footer {
            margin-top: 1.5rem;
            text-align: center;
            color: #404060;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">/run</div>
            <div class="status">
                <span class="key-indicator" id="keyCount">[keys: 0]</span>
                <div class="indicator" id="keyStatus"></div>
            </div>
        </div>

        <div class="split-panel">
            <div class="panel">
                <div class="panel-header">
                    <span class="dot"></span>
                    <span>input</span>
                </div>
                <textarea class="input-area" id="promptInput" placeholder=">_"></textarea>
                
                <div class="file-zone" id="fileZone">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3v12m0 0-3-3m3 3 3-3M5 21h14" stroke-linecap="round"/>
                    </svg>
                    <p>upload</p>
                </div>
                
                <div class="file-list" id="fileList"></div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="dot"></span>
                    <span>config</span>
                </div>
                
                <div class="key-file-section">
                    <div class="key-file-label">
                        <span>🔑</span>
                        <span>key file</span>
                    </div>
                    <input type="file" id="keyFileInput" accept=".txt,.key,.env,.json" class="key-file-input">
                    <div class="key-status">
                        <span id="keyFileName">no file loaded</span>
                    </div>
                </div>

                <select class="model-select" id="modelSelect">
                    <option value="mixtral-8x7b-32768">mixtral-8x7b</option>
                    <option value="llama2-70b-4096">llama2-70b</option>
                    <option value="gemma-7b-it">gemma-7b</option>
                </select>

                <div class="button-group">
                    <div class="button" id="streamToggle">stream</div>
                    <div class="button" id="clearBtn">clear</div>
                </div>

                <div class="button primary" id="submitBtn">execute</div>
            </div>
        </div>

        <div class="output-area">
            <div class="output-header">
                <span>output</span>
                <span class="token-counter" id="tokenDisplay">0 tokens</span>
            </div>
            <div class="output-content" id="output">_</div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>processing...</span>
            </div>
        </div>

        <div class="footer">[x]</div>
    </div>

    <script>
        let groqKeys = [];
        let currentKeyIndex = 0;
        let uploadedFiles = [];
        let isStreaming = false;

        document.getElementById('keyFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('keyFileName').innerText = file.name;

            const reader = new FileReader();
            reader.onload = (event) => {
                const content = event.target.result;
                parseKeyFile(content);
            };
            reader.readAsText(file);
        });

        function parseKeyFile(content) {
            const lines = content.split('\n');
            const keys = [];
            
            lines.forEach(line => {
                line = line.trim().replace(/["',]/g, '');
                
                if (line.startsWith('gsk_') && line.length > 40) {
                    keys.push(line);
                }
                
                const match = line.match(/[A-Za-z0-9_]+=(gsk_.+)/);
                if (match && match[1].startsWith('gsk_')) {
                    keys.push(match[1]);
                }
            });

            if (keys.length > 0) {
                groqKeys = keys;
                currentKeyIndex = 0;
                document.getElementById('keyCount').innerText = `[keys: ${keys.length}]`;
                document.getElementById('keyStatus').style.background = '#ff78f0';
                document.getElementById('keyStatus').style.boxShadow = '0 0 10px #ff78f0';
            }
        }

        document.getElementById('fileZone').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = '.txt,.pdf,.doc,.docx,.json,.js,.py,.html,.css,.md,.csv';
            
            input.onchange = (e) => {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        uploadedFiles.push({
                            name: file.name,
                            content: event.target.result,
                            type: file.type
                        });
                        updateFileList();
                    };
                    reader.readAsText(file);
                });
            };
            
            input.click();
        });

        function updateFileList() {
            const container = document.getElementById('fileList');
            container.innerHTML = uploadedFiles.map((file, index) => `
                <div class="file-item">
                    <span>${file.name}</span>
                    <span class="remove-file" onclick="removeFile(${index})">×</span>
                </div>
            `).join('');
        }

        window.removeFile = (index) => {
            uploadedFiles.splice(index, 1);
            updateFileList();
        };

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('promptInput').value = '';
            document.getElementById('output').innerText = '_';
            uploadedFiles = [];
            updateFileList();
            document.getElementById('tokenDisplay').innerText = '0 tokens';
        });

        document.getElementById('streamToggle').addEventListener('click', (e) => {
            isStreaming = !isStreaming;
            e.target.style.background = isStreaming ? 'rgba(255,120,240,0.2)' : '';
            e.target.style.borderColor = isStreaming ? '#ff78f0' : '';
        });

        function getNextKey() {
            if (groqKeys.length === 0) return null;
            const key = groqKeys[currentKeyIndex];
            currentKeyIndex = (currentKeyIndex + 1) % groqKeys.length;
            return key;
        }

        async function callGroq(prompt, files) {
            if (groqKeys.length === 0) {
                return '[error: no API keys loaded. upload a key file first]';
            }

            let context = prompt;
            
            if (files.length > 0) {
                context += '\n\n---\nattached files:\n';
                files.forEach(f => {
                    context += `\n[${f.name}]\n${f.content.substring(0, 2000)}\n`;
                });
            }

            const model = document.getElementById('modelSelect').value;
            const key = getNextKey();

            if (!key) return '[error: invalid key]';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            {
                                role: 'system',
                                content: 'respond directly. no fluff.'
                            },
                            {
                                role: 'user',
                                content: context
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 2048,
                        stream: isStreaming
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API ${response.status}: ${errorText.substring(0, 50)}`);
                }

                if (isStreaming) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') continue;
                                
                                try {
                                    const parsed = JSON.parse(data);
                                    const content = parsed.choices[0]?.delta?.content || '';
                                    if (content) {
                                        fullText += content;
                                        document.getElementById('output').innerText = fullText || '_';
                                    }
                                } catch (e) {}
                            }
                        }
                    }
                    
                    return fullText;
                } else {
                    const data = await response.json();
                    const content = data.choices[0]?.message?.content || '';
                    
                    if (data.usage) {
                        document.getElementById('tokenDisplay').innerText = `${data.usage.total_tokens} tokens`;
                    }
                    
                    return content;
                }
            } catch (error) {
                console.error('API call failed:', error);
                return `[error: ${error.message}]`;
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt && uploadedFiles.length === 0) return;

            const loading = document.getElementById('loading');
            const output = document.getElementById('output');
            
            loading.classList.add('active');
            output.innerText = '...';
            
            try {
                const result = await callGroq(prompt, uploadedFiles);
                if (!isStreaming) {
                    output.innerText = result || '_';
                }
            } catch (error) {
                output.innerText = `[system error]`;
            } finally {
                loading.classList.remove('active');
            }
        });

        document.getElementById('promptInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                document.getElementById('submitBtn').click();
            }
        });
    </script>
</body>
</html>
