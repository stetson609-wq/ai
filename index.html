<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Sets | Quizlet</title>

<link rel="icon" href="https://quizlet.com/favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>

<body>
<div class="chat-container">

  <header class="chat-header">
    <div class="header-left">
      <span class="status-dot"></span>
      <span class="header-title">Quizlet<span></span></span>
    </div>
  </header>

  <main id="messages" class="messages">
    <div id="empty-state" class="empty">
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Enter the join code</p>
    </div>
  </main>

  <footer class="chat-input">
    <div class="input-box">
      <textarea id="user-input" placeholder="message..." rows="1"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <button id="clear-btn">clear</button>
    </div>
  </footer>

</div>

<script src="js/app.js" defer></script>
</body>
</html>
